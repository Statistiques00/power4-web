<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choix du mode de jeu</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css?v=4">
    <script>
        (function() {
            var saved = localStorage.getItem('power4-theme');
            var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.dataset.theme = theme;
        })();
    </script>
</head>
<body class="skin-{{.Skin}}">
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Changer de theme"></button>

    <main class="mode-shell">
        <section class="mode-card panel">
            <header class="mode-title">
                <div class="eyebrow">Gravit&eacute;</div>
                <h1>Choisir le rythme</h1>
                <p class="subcopy">S&eacute;lectionnez le comportement du plateau avant de lancer la partie.</p>
            </header>

            <form method="POST">
                <input type="hidden" name="username" value="{{.Username}}">
                <input type="hidden" name="difficulty" value="{{.Difficulty}}">
                <input type="hidden" name="skin" value="{{.Skin}}">
                <input type="hidden" name="gamemode" value="{{.GameMode}}">
                <input type="hidden" name="ailevel" value="{{.AILevel}}">
                {{if .Username2}}
                <input type="hidden" name="username2" value="{{.Username2}}">
                {{end}}
                <div class="mode-choice">
                    <button class="mode-btn" name="mode" value="normal" type="submit">
                        <span class="mode-icon" aria-hidden="true">v</span>
                        <span class="mode-name">Normal</span>
                        <span class="mode-description">Gravit&eacute; classique</span>
                    </button>
                    <button class="mode-btn" name="mode" value="inverse" type="submit">
                        <span class="mode-icon" aria-hidden="true">^</span>
                        <span class="mode-name">Invers&eacute;e</span>
                        <span class="mode-description">Les pions montent</span>
                    </button>
                </div>
            </form>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('click', function() {
                const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
                document.documentElement.dataset.theme = next;
                localStorage.setItem('power4-theme', next);
            });
        });
    </script>
</body>
</html>
