<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puissance 4 - D&eacute;marrer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/style.css?v=4">
    <script>
        (function() {
            var saved = localStorage.getItem('power4-theme');
            var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
            document.documentElement.dataset.theme = theme;
        })();
    </script>
</head>
<body class="skin-classic">
    <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Changer de theme"></button>

    <main class="page-shell">
        <div class="app-grid">
            <form class="form-panel panel" method="POST">
                <header class="brand-block">
                    <div class="eyebrow">Power4 Web</div>
                    <h1 class="headline">Puissance 4</h1>
                    <p class="subcopy">Configurez une partie nette, rapide et lisible avant de lancer le plateau.</p>
                </header>

                <section class="form-section">
                    <div class="section-title">Joueurs</div>
                    <div class="field-grid">
                        <label class="field full" id="username1-label">
                            <span id="username1-text">Nom du joueur 1</span>
                            <input id="username-input" type="text" name="username" required autocomplete="off" maxlength="16" placeholder="Joueur 1">
                        </label>
                        <label class="field full is-hidden" id="username2-label">
                            <span>Nom du joueur 2</span>
                            <input type="text" name="username2" autocomplete="off" maxlength="16" placeholder="Joueur 2">
                        </label>
                    </div>
                </section>

                <section class="form-section">
                    <div class="section-title">Param&egrave;tres</div>
                    <div class="field-grid">
                        <label class="field">
                            <span>Difficult&eacute;</span>
                            <select name="difficulty">
                                <option value="easy">Facile (6x7)</option>
                                <option value="normal">Normal (7x8)</option>
                                <option value="hard">Difficile (8x10)</option>
                            </select>
                        </label>
                        <label class="field">
                            <span>Mode de jeu</span>
                            <select name="gamemode" id="gamemode-select">
                                <option value="human">Joueur vs Joueur</option>
                                <option value="ai">Joueur vs IA</option>
                            </select>
                        </label>
                        <label class="field full is-hidden" id="ai-level-label">
                            <span>Niveau de l'IA</span>
                            <select name="ailevel">
                                <option value="easy">Facile</option>
                                <option value="medium">Moyen</option>
                                <option value="hard">Difficile</option>
                            </select>
                        </label>
                    </div>
                </section>

                <section class="skin-chooser">
                    <div class="section-title">Skin</div>
                    <div class="skins-grid">
                        <label class="skin-card selected" data-skin="classic" title="Classique">
                            <input type="radio" name="skin" value="classic" checked>
                            <span class="skin-thumb classic" aria-hidden="true">
                                <span class="disc red"></span>
                                <span class="disc yellow"></span>
                                <span class="disc red"></span>
                            </span>
                            <span class="skin-name">Classique</span>
                        </label>
                        <label class="skin-card" data-skin="neon" title="N&eacute;on">
                            <input type="radio" name="skin" value="neon">
                            <span class="skin-thumb neon" aria-hidden="true">
                                <span class="disc red"></span>
                                <span class="disc yellow"></span>
                                <span class="disc red"></span>
                            </span>
                            <span class="skin-name">N&eacute;on</span>
                        </label>
                        <label class="skin-card" data-skin="retro" title="R&eacute;tro">
                            <input type="radio" name="skin" value="retro">
                            <span class="skin-thumb retro" aria-hidden="true">
                                <span class="disc red"></span>
                                <span class="disc yellow"></span>
                                <span class="disc red"></span>
                            </span>
                            <span class="skin-name">R&eacute;tro</span>
                        </label>
                    </div>
                </section>

                <button class="primary-action" type="submit">Commencer</button>
            </form>

            <section class="preview-panel panel" aria-label="Previsualisation du plateau">
                <div class="preview-copy">
                    <div class="eyebrow">Aper&ccedil;u</div>
                </div>
                <div class="preview-stage">
                    <div class="skin-preview-board classic" id="skin-preview"></div>
                </div>
            </section>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('click', function() {
                const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
                document.documentElement.dataset.theme = next;
                localStorage.setItem('power4-theme', next);
            });

            const skinPreview = document.getElementById('skin-preview');
            const body = document.body;
            const skinCards = Array.from(document.querySelectorAll('.skin-card'));
            const gamemodeSelect = document.getElementById('gamemode-select');
            const aiLevelLabel = document.getElementById('ai-level-label');
            const username2Label = document.getElementById('username2-label');
            const username1Text = document.getElementById('username1-text');
            const usernameInput = document.getElementById('username-input');

            function buildPreview() {
                skinPreview.innerHTML = '';
                for (let i = 0; i < 42; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'skin-preview-cell';
                    if ([2, 3, 8, 10, 15, 17, 22, 23, 29, 31, 37, 38].includes(i)) {
                        cell.classList.add(i % 2 === 0 ? 'red' : 'yellow');
                    }
                    skinPreview.appendChild(cell);
                }
            }

            function applySkin(skin) {
                skinPreview.classList.add('is-changing');
                window.setTimeout(function() { skinPreview.classList.remove('is-changing'); }, 180);
                skinPreview.className = 'skin-preview-board ' + skin + ' is-changing';
                body.className = 'skin-' + skin;
                skinCards.forEach(function(card) {
                    card.classList.toggle('selected', card.dataset.skin === skin);
                });
            }

            skinCards.forEach(function(card) {
                card.addEventListener('click', function() {
                    const input = card.querySelector('input[type="radio"]');
                    input.checked = true;
                    applySkin(input.value);
                });
                const input = card.querySelector('input[type="radio"]');
                input.addEventListener('change', function() {
                    applySkin(input.value);
                });
            });

            function toggleByMode() {
                const isAI = gamemodeSelect.value === 'ai';
                aiLevelLabel.classList.toggle('is-hidden', !isAI);
                username2Label.classList.toggle('is-hidden', isAI);
                username1Text.textContent = isAI ? 'Nom du joueur' : 'Nom du joueur 1';
                usernameInput.placeholder = isAI ? 'Votre pseudo' : 'Joueur 1';
            }

            buildPreview();
            const checked = document.querySelector('.skin-card input[type="radio"]:checked');
            if (checked) applySkin(checked.value);
            gamemodeSelect.addEventListener('change', toggleByMode);
            toggleByMode();
        });
    </script>
</body>
</html>
